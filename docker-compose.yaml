version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: docker/php/8.3/Dockerfile
    container_name: student_app
    working_dir: /var/www/
    volumes:
      - ./src:/var/www/
    depends_on:
      - db
    networks:
      - students-network

  web:
    image: nginx:latest
    container_name: student_web
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - students-network

  db:
    image: mysql:latest
    container_name: student_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: students
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - students-network

  redis:
    image: redis:latest
    container_name: student_redis
    ports:
      - "6379:6379"
    networks:
      - students-network

volumes:
  db_data:
networks:
  students-network: